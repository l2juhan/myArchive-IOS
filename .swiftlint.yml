# myArchive SwiftLint 설정 — PDF 하네스 'edit 시점' 게이트(PostToolUse/preBuild)와 연동
included:
  - myArchive
  - myArchiveTests
excluded:
  - myArchive.xcodeproj
  - DerivedData
  - .build

disabled_rules:
  - todo                    # 개발 중 TODO 허용
  - trailing_comma

opt_in_rules:
  - empty_count
  - force_unwrapping        # 비밀번호 앱 — 강제 언래핑 경계
  - first_where
  - sorted_first_last
  - redundant_nil_coalescing
  - closure_spacing
  - explicit_init

line_length:
  warning: 120
  error: 160
  ignores_comments: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 450

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length: 2
  excluded: [id, x, y, vm, db, r, g, b, a, q, to]

# 시크릿 평문 로깅 방지 — 커스텀 규칙(보안 게이트)
custom_rules:
  no_print_secret:
    name: "시크릿 print 금지"
    regex: 'print\([^)]*(password|secret|keychain)[^)]*\)'
    message: "비밀번호/시크릿 값을 print로 출력하지 않는다 (PRD 7장 보안 모델)."
    severity: error
